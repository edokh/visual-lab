<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisualLab - الفصول</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: #0f0f1a;
            color: #fff;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 35px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }

        .back {
            text-decoration: none;
            color: white;
            background: #2b5fd9;
            padding: 10px 22px;
            border-radius: 30px;
            transition: .2s;
        }

        .back:hover {
            background: #3c73f5;
        }

        h1 {
            color: #7fc8ff;
            font-size: 2rem;
        }

        .subtitle {
            color: #b5c4de;
            margin-top: 8px;
            margin-bottom: 35px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 22px;
        }

        .chapter {
            text-decoration: none;
            color: white;
            background: #1b1c32;
            border: 1px solid #2f3458;
            border-radius: 14px;
            padding: 22px;
            transition: .25s;
        }

        .chapter:hover {
            transform: translateY(-5px);
            border-color: #5aaeff;
            box-shadow: 0 8px 24px rgba(0, 0, 0, .35);
        }

        .number {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #2b5fd9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 18px;
        }

        .chapter h2 {
            color: #8fd5ff;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        .chapter p {
            color: #b8c5dc;
            line-height: 1.8;
            font-size: .92rem;
        }

        .footer {
            margin-top: 45px;
            text-align: center;
            color: #73819b;
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="header">

            <div style="text-align:right;">
                <h1>فصول المختبر</h1>
                <div class="subtitle">
                    اختر الفصل لعرض التجارب التفاعلية الخاصة به.
                </div>
            </div>
        </div>

        <div class="grid">

            <a class="chapter" hidden href="chapter1.html">

                <div class="number">1</div>

                <h2>الفصل الأول</h2>

                <p>
                    الكهرباء الساكنة والمجالات الكهربائية.
                </p>

            </a>

            <a class="chapter" href="chapter2.html">

                <div class="number">2</div>

                <h2>الفصل الثاني</h2>

                <p>
                    الحث الكهرومغناطيسي
                </p>

            </a>

            <a class="chapter" hidden href="chapter3.html">

                <div class="number">3</div>

                <h2>الفصل الثالث</h2>

                <p>
                    الحث الكهرومغناطيسي وقانون فاراداي ولنز.
                </p>

            </a>

            <a class="chapter" hidden href="chapter4.html">

                <div class="number">4</div>

                <h2>الفصل الرابع</h2>

                <p>
                    تطبيقات الحث الكهرومغناطيسي والتيارات الدوامية.
                </p>

            </a>

        </div>

    </div>

</body>

</html>
