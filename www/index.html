<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisualLab</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: radial-gradient(circle at center, #1d2245 0%, #0f0f1a 100%);
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        .landing {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            animation: fadeIn 1s ease;
        }

        .logo {
            font-size: 4rem;
            color: #7fc8ff;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.4rem;
            color: #d0d8ff;
            margin-bottom: 60px;
        }

        .author {
            font-size: 1.2rem;
            color: #c8d8ff;
            margin-bottom: 35px;
        }

        .start-btn {
            background: linear-gradient(135deg, #4a8cff, #6ab7ff);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 18px 60px;
            font-size: 1.4rem;
            cursor: pointer;
            transition: .25s;
            box-shadow: 0 0 25px rgba(74, 140, 255, .4);
        }

        .start-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 0 35px rgba(74, 140, 255, .7);
        }

        .footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: #7c88aa;
            font-size: .9rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

</head>

<body>

    <div class="landing">

        <div class="logo"> مختبر الفيزياء
        </div>

        <div class="subtitle">
            تجربة تفاعلية لتعلم الفيزياء بطريقة ممتعة
        </div>

        <div class="author">
            إعداد الأستاذ<br>
            <strong>أبــاذر إسمــاعيل</strong>
        </div>
        <button class="start-btn" onclick="window.location.href='chapters.html'">
            ابدأ
        </button>

    </div>

    <div class="footer">
        © VisualLab
    </div>

</body>

</html>
